msg:
  server-running: |
    The rcron server has been activated!
    You can start interacting through instructions.
    If you don't know what to do, you can use %{help} to view help.
  which-timezone: "Use the time zone: %{local}"
  run-command: "run command: %{cmd}"

time:
  sec: "sec"

usage:
  client: |
    Usage:
    -q      Stop server
    -l [N]  List the next N trigger times in each task

warn:
  do_not_import_anything: "no any tasks are loaded!"

err:
  unknown_para: |
    Unknown parameter. Usage:
    %{usage}
  socket_connect: "Unable to connect to Daemon, please confirm whether the server is running."
  invalid_timezone_offset: "Invalid time zone offset"
  timezone_overflow: "The time zone offset is out of range"
  unable_read_file: "Unable to read %{filename}. filepath: %{path}"
  parse_error: "Parsing failure: Line: %{line}: %{err}"
  unknown_timeformat: "Incorrect format (reeds 6-bit time format + instruction): %{line}"
  run_cmd_error: "Task execution error %{err}"

